services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      AGENTLENS_MONGODB_URI: mongodb://mongodb:27017
      AGENTLENS_MONGODB_DATABASE: agentlens
    ports:
      - "8000:8000"
    depends_on:
      - mongodb

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    environment:
      NEXT_PUBLIC_AGENTLENS_API_BASE_URL: http://backend:8000
    ports:
      - "3000:3000"
    depends_on:
      - backend

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

volumes:
  mongodb_data:
